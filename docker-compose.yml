version: '3.8'

services:
  # Database Service (PostgreSQL + PostGIS spatial extension)
  db:
    image: postgis/postgis:15-3.3
    container_name: cloudfree_db
    environment:
      POSTGRES_USER: isro_admin
      POSTGRES_PASSWORD: CloudFreeAI_Secure_Password_2026
      POSTGRES_DB: cloudfree_gis
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U isro_admin -d cloudfree_gis"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Message Broker (Redis for Celery background tasks)
  redis:
    image: redis:7-alpine
    container_name: cloudfree_redis
    ports:
      - "6379:6379"
    restart: always

  # FastAPI Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cloudfree_backend
    environment:
      - DATABASE_URL=postgresql://isro_admin:CloudFreeAI_Secure_Password_2026@db:5432/cloudfree_gis
      - REDIS_URL=redis://redis:6379/0
      - GEMINI_API_KEY=YOUR_GEMINI_API_KEY_HERE
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./models:/models
      - shared-data:/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always

  # Celery Background Worker for Heavy Raster/AI computations
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cloudfree_worker
    command: celery -A main.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://isro_admin:CloudFreeAI_Secure_Password_2026@db:5432/cloudfree_gis
      - REDIS_URL=redis://redis:6379/0
      - GEMINI_API_KEY=YOUR_GEMINI_API_KEY_HERE
    volumes:
      - ./backend:/app
      - ./models:/models
      - shared-data:/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always

  # Next.js Frontend UI Dashboard
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cloudfree_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: always

volumes:
  pgdata:
  shared-data:
